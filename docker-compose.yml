services:
  rag-engine:
    build: .
    container_name: rag-engine
    ports:
      - "8080:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - API_KEY=${API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - VIEWER_KEY=${VIEWER_KEY}
      - SESSIONS_KEY=${SESSIONS_KEY}
    depends_on:
      - postgres
      - redis

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_ADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PG_ADMIN_PASS}
    ports:
      - "5050:80"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: chat-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - chatdb-data:/var/lib/postgresql/data   # Persist data across container restarts

  redis:
    image: redis:7
    container_name: chat-redis
    ports:
      - "6379:6379"      # Expose port 6379 for Redis
    volumes:
      - redis-data:/data  # Persist Redis data (if needed)


volumes:
  chatdb-data:   # Persistent volume for PostgreSQL data
  redis-data:    # Persistent volume for Redis data
